<!DOCTYPE html>
<html lang="en">
<head>
     <title>Document</title>
     <style>
    .parent {
          width: 600px;
          height: 400px;
          border: 5px solid black;
          background-color: blue;
          display: grid;
          gap: 10px;
          padding: 10px;
          grid-template-columns: 1fr 1fr;
    }
    .parent > div {
        background-color: green;
        color: palevioletred;
        font-size: 100px;
        text-align: center;
    }
    .parent > .child1 {
        grid-row: span 2;
    }
     </style>
</head>
<body><div class="parent">
    <div class="child1">1</div>
    <div class="child2">2</div>
    <div class="child3">3</div>
</div>
    
</body>
</html>
