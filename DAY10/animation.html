<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .box {
            background-color: rgb(47, 0, 255);
            border: 10px solid black;
            height: 300px;
            width: 300px;
            margin-top: 100px;
            margin-left: 100px;
        }
        .box:hover {
            background-color: rgb(192, 21, 126);
            border-radius: 100%;
            transition-duration: 3s;
            transform: skew(360deg);
        }
    </style>
</head>
<body>
    <div class="box">
        
    </div>
    
</body>
</html>
