<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .parent {
            width: 400px;
            height: 400px;
            border: 3px solid black;
            background-color: aqua;
            position: relative;
        }
        .child {
            height: 30%;
            width: 30%;
            border: 3px solid black;
            background-color: purple;
            position: absolute;
            right: 0px;
            bottom: 0px;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
    </div>
    
</body>
</html>
