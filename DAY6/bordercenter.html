<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .parent {
            width: 400px;
            height: 400px;
            border: 50px solid black;
            background-color: greenyellow;
            border-radius: 100%;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .child {
            width: 30%;
            height: 30%;
            border: 5px solid black;
            background-color: blue;
            border-radius: 100%;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
    </div>
    
</body>
</html>
