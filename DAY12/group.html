<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .parent {
            height: 200px;
            width: 400px;
            border: 5px solid black;
            overflow: scroll;
            padding: 10px;
        }
        .parent::-webkit-scrollbar {
            display: none;
        }
        .parent > .group {
            height: 200px;
            width: 1800px;
            border: 5px solid rgb(182, 44, 44);
            gap: 10px;
            display: flex;
            animation: scrollH 10s linear 0s infinite normal;
        }
        .parent > .group > div {
            flex: 1 0 auto;
            background-color: crimson;
            height: 400px;
        }
        @keyframes scrollH {
            from{
                transform: translatex(-400px);
            }
            to {
                transform: translatex(400px);
            }
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="group">
            <div class="child1"></div>
            <div class="child2"></div>
            <div class="child3"></div>
            <div class="child4"></div>
            <div class="child5"></div>
            <div class="child6"></div>
            <div class="child7"></div>
            <div class="child8"></div>
        </div>
    </div>
</body>
</html>
