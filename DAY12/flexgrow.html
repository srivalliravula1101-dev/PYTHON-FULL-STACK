<!DOCTYPE html>
<html lang="en">
<head>
        <title>Document</title>
        <style>
            .parent {
                border: 5px solid black;
                width: 600px;
                height: 100px;
                display: flex;
                gap: 5px;
                overflow: auto;
            }
            .parent > div {
                width: 100px;
                height: 100px;
                background-color: green;
                flex-grow: 1;
            }
            .parent > .child1 {
                flex-grow: 1;
            }
            .parent > .child2 {
                flex-grow: 2;
            }
            .parent > .child3 {
                flex-grow: 3;
            }
        </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
    </div>
    
</body>
</html>
