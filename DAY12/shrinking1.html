<!DOCTYPE html>
<html lang="en">
<head>
        <title>Document</title>
        <style>
            .parent {
                border: 5px solid black;
                width: 300px;
                height: 100px;
                display: flex;
                gap: 5px;
                overflow: auto;
            }
            .parent > div {
                flex: 0 1 auto;
                height: 200px;
                background-color: blueviolet;
                color: white;
            }
        </style>
</head>
<body>
    <div class="parent">
        <div class="child1">one</div>
        <div class="child2">two</div>
        <div class="child3">three</div>
    </div>
    
</body>
</html>
