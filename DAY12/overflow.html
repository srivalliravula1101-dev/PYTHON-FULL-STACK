<!DOCTYPE html>
<html lang="en">
<head>
        <title>Document</title>
        <style>
            * {
                margin: 0px;
                padding: 0px;
            }
            .parent {
                width: 200px;
                height: 100px;
                border: 5px solid black;
                box-sizing: border-box;
            }
            .parent > div {
                width: 200px;
                height: 100px;
                background-color: blue;
                padding: 10px;
            }
        </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
    </div>
    
</body>
</html>
