<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        body {
            background-color: aqua;
            height: 6000px;
        }
        .hero-section > .images-part {
            width: 100%;
            height: 100%;
            background-color: red;
            background-image: url(images.jfif);
            justify-content: center;
            align-items: center;
            display: flex;
        }
        .hero-section > .images-part > .layer {
            background-color: black;
            opacity: 0.5;
            width: 100%;
            height: 100%;
            position: absolute;
            border-radius: 50px;
        }
        .hero-section > .images-part > .layer > h1 {
            position: absolute;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
        }
        .cards-section {
            width: 55vw;
            height: 45vh;
            background-color: yellowgreen;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="image"></div>
    </div>
    <div calss="cards-section"></div>
    
</body>
</html>
