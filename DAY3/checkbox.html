<!doctype html>

    <!-- check box -->
    <form>
      <label>select your skill:</label>
      <input type="checkbox" id="j" name="skill" value="java" />
      <label for="j">JAVA</label>
      <input type="checkbox" id="p" name="skill" value="python" />
      <label for="p">Python</label>
      <input type="checkbox" id="c" name="skill" value="c" />
      <label for="c">C</label>
      <br /><br />
      <input type="checkbox" id="f" name="check" value="True" required />
      <label for="f">Accept Terms & conditions</label>
      <br />
      <input type="submit" />
    </form>
  </body>
</html>
