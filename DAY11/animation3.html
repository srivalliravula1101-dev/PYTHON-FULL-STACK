<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        img {
            width: 300px;
            animation: load 5s linear 0s 1 normal forward;
        }
        h1 {
            text-transform: uppercase;
            font-size: 100px;
            text-align: center;
            animation: enter 10s linear 0s 1 normal;
        }
        @keyframes enter {
            from {
                transform: translateX(100px);
            }
            to {
                transform: translateX(0px);
            }

        }
    </style>
        <title>Document</title>
</head>
<body>
    <img src="nature1.jfif" alt="error" />
    <h1>HELLO SREEVALLI</h1>
</body>
</html>
